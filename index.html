<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABTI箭格鉴定局</title>
    <style>
        :root { --blue-bg: #e3f2fd; --blue-text: #1976d2; --green-bg: #e8f5e9; --green-text: #2e7d32; --purple-bg: #f3e5f5; --purple-text: #7b1fa2; --yellow-bg: #fffde7; --yellow-text: #8d6e63; }
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        #app { width: 100%; max-width: 420px; background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .quiz-box { padding: 40px 25px; text-align: center; }
        .question-text { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 30px; }
        .option-btn { display: block; width: 100%; padding: 18px 20px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 18px; background: white; font-size: 16px; cursor: pointer; text-align: left; }
        #result { display: none; text-align: center; padding-bottom: 40px; }
        .color-card { height: 260px; margin: 0 20px; border-radius: 24px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .res-name { font-size: 40px; font-weight: 900; margin-top: 20px; }
        .res-code { font-size: 30px; font-weight: 900; opacity: 0.8; margin-bottom: 20px; }
        .res-desc-box { margin: 0 30px; padding: 20px; border-radius: 20px; text-align: left; line-height: 1.6; }
        .action-btn { display: block; width: 80%; margin: 20px auto 0; padding: 15px; border-radius: 15px; background: #333; color: white; font-weight: bold; border: none; cursor: pointer; }
        .restart-btn { display: block; width: 80%; margin: 10px auto; background: none; color: #999; border: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div id="app">
    <div id="quiz" class="quiz-box">
        <div id="step-info" style="color:#bbb; font-size:12px;">READY</div>
        <div id="q-text" class="question-text">ABTI 打弓人箭格鉴定局</div>
        <div id="q-options"><button class="option-btn" onclick="startQuiz()">开始鉴定</button></div>
    </div>
    <div id="result">
        <div style="padding:20px; color:#666;">你的箭格是：</div>
        <div id="res-card" class="color-card"></div>
        <div class="res-name" id="res-name"></div>
        <div class="res-code" id="res-code"></div>
        <div id="res-desc" class="res-desc-box"></div>
        <button class="action-btn" onclick="generateCanvasImage()">保存卡片</button>
        <button class="restart-btn" onclick="location.reload()">重新测试</button>
    </div>
</div>
<div id="canvas-mask" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
    <img id="final-image" style="max-width:90%; border-radius:15px;">
    <p style="color:white; margin-top:15px;">长按图片保存</p>
    <button onclick="document.getElementById('canvas-mask').style.display='none'" style="margin-top:20px; color:white; background:none; border:1px solid white; padding:10px 20px; border-radius:10px;">关闭</button>
</div>
<script>
    const questions = [{q:"攒了钱第一反应？",a:"换器材",b:"报大师课",t:"OT"},{q:"想要啥礼物？",a:"顶级瞄具",b:"大师指导",t:"OT"},{q:"遇瓶颈？",a:"调器材",b:"改动作",t:"OT"},{q:"练箭时手机？",a:"录动作",b:"拍帅片",t:"PF"},{q:"有人指点？",a:"自己练",b:"聊黑话",t:"PF"},{q:"最难忍受？",a:"太吵",b:"没地拍照",t:"PF"},{q:"落后1环？",a:"走流程",b:"心跳快",t:"CB"},{q:"打个6环？",a:"按标准来",b:"纠结变形",t:"CB"},{q:"有人说话？",a:"屏蔽",b:"断网",t:"CB"},{q:"理想体验？",a:"场地赛",b:"山林局",t:"MH"},{q:"瞄准？",a:"精密瞄具",b:"靠手感",t:"MH"},{q:"动力？",a:"满环数据",b:"人弓合一",t:"MH"},{q:"训练频率？",a:"准时打卡",b:"随缘出没",t:"PF"},{q:"赛前？",a:"检器材",b:"拍合影",t:"OT"}];
    const resultsData = {
        "OPCM":{n:"人形卡尺",c:"10-10-10",cl:"blue",d:"追求极致精密。你不需要社交，你只需要十环。"},
        "TPCM":{n:"动作质检员",c:"GOOD-POSER",cl:"blue",d:"动作必须优雅，脱靶也要脱得好看。"},
        "TPCH":{n:"枯燥苦修僧",c:"NO-BB",cl:"blue",d:"与世隔绝的防火墙，只想安静打完300支箭。"},
        "OPCH":{n:"文化布道师",c:"OLD-STYLE",cl:"blue",d:"开弓的精气神最重要，古礼不能废。"},
        "TFBM":{n:"擦边艺术家",c:"CBZ",cl:"green",d:"环线附近的钉子户，箭馆快乐担当。"},
        "TFBH":{n:"草丛探险家",c:"ARROW-FINDER",cl:"green",d:"箭靶只是参考，草丛才是舞台。"},
        "OFBH":{n:"古典气氛组",c:"PHOTO-ONLY",cl:"green",d:"只要快门声够响，中不中那是后期的事。"},
        "TFCM":{n:"节奏大师",c:"SWING",cl:"green",d:"对节奏要求极高，弦响瞬间压力和解。"},
        "OPBM":{n:"悲情练习生",c:"I SHY",cl:"purple",d:"独自是战神，有人就炸坑。"},
        "TPBM":{n:"流程优化专家",c:"ALWAYS-BETA",cl:"purple",d:"动作版本永远在优化，从未稳定上线。"},
        "TTBH":{n:"倔强青铜",c:"HARD-MODE",cl:"purple",d:"死磕传统弓，追求用意不用力的玄学。"},
        "OFCM":{n:"佛系神箭手",c:"FREE-STYLE",cl:"purple",d:"随手一放皆是天意，无欲则刚。"},
        "OTCH":{n:"扫地僧",c:"MONK",cl:"yellow",d:"隐于市的修行者，全场都知道你是天花板。"},
        "TTCH":{n:"传统大神",c:"JUST-FEEL",cl:"yellow",d:"迷恋纯粹手感，反科学的存在。"},
        "TBCM":{n:"随缘狙击手",c:"X-MAN",cl:"yellow",d:"他眼里的靶纸没有环数，只有中间的X。"},
        "OBCM":{n:"器材质检员",c:"FIX-MAN",cl:"yellow",d:"弓响声不对他比你还难受，免费维修大师。"}
    };
    let step=0, s={O:0,T:0,P:0,F:0,C:0,B:0,M:0,H:0}, code="";
    function startQuiz(){ showQ(); }
    function showQ(){
        const q=questions[step]; document.getElementById('step-info').innerText=`STEP ${step+1}/14`;
        document.getElementById('q-text').innerText=q.q;
        document.getElementById('q-options').innerHTML=`<button class="option-btn" onclick="h('${q.t[0]}')">${q.a}</button><button class="option-btn" onclick="h('${q.t[1]}')">${q.b}</button>`;
    }
    function h(c){ s[c]++; step++; if(step<14) showQ(); else render(); }
    function render(){
        code=(s.O>=s.T?'O':'T')+(s.P>=s.F?'P':'F')+(s.C>=s.B?'C':'B')+(s.M>=s.H?'M':'H');
        const d=resultsData[code]||resultsData["OPCM"]; document.getElementById('quiz').style.display='none'; document.getElementById('result').style.display='block';
        const card=document.getElementById('res-card'); card.style.backgroundColor=getComputedStyle(document.documentElement).getPropertyValue(`--${d.cl}-bg`);
        card.style.backgroundImage=`url('${code}.png')`; document.getElementById('res-name').innerText=d.n; document.getElementById('res-code').innerText=d.c;
        const box=document.getElementById('res-desc'); box.innerText=d.d; box.style.backgroundColor=card.style.backgroundColor; box.style.color=getComputedStyle(document.documentElement).getPropertyValue(`--${d.cl}-text`);
    }
    function generateCanvasImage(){
        const d=resultsData[code]; const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d'); canvas.width=800; canvas.height=1200;
        ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,800,1200); ctx.fillStyle="#333"; ctx.font="bold 36px sans-serif"; ctx.textAlign="center"; ctx.fillText("ABTI打弓人箭格鉴定局",400,80);
        const img=new Image(); img.src=`${code}.png`;
        img.onload=function(){
            ctx.drawImage(img,200,150,400,400); ctx.fillStyle="#333"; ctx.font="bold 80px sans-serif"; ctx.fillText(d.n,400,650);
            ctx.fillStyle="#8d6e63"; ctx.font="bold 60px sans-serif"; ctx.fillText(d.c,400,740);
            ctx.fillStyle="#f5f5f5"; ctx.fillRect(60,820,680,220); ctx.fillStyle="#333"; ctx.font="32px sans-serif"; ctx.textAlign="left";
            let words=d.d.split(''), line='', y=880;
            for(let n=0;n<words.length;n++){ let testLine=line+words[n]; if(ctx.measureText(testLine).width>600){ ctx.fillText(line,100,y); line=words[n]; y+=48; }else{ line=testLine; } }
            ctx.fillText(line,100,y); document.getElementById('final-image').src=canvas.toDataURL(); document.getElementById('canvas-mask').style.display='flex';
        };
        img.onerror=function(){ img.onload(); };
    }
</script>
</body>
</html>
